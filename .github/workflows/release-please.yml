# Semantic versioning automation (https://github.com/googleapis/release-please).
#
# How it works:
#   - Commits to main follow Conventional Commits (feat:, fix:, chore:, feat!: …).
#   - release-please keeps a "release PR" open that accumulates the changelog and the
#     next semver bump (fix -> patch, feat -> minor, ! / BREAKING CHANGE -> major).
#   - Merging that PR creates the git tag (vX.Y.Z) + GitHub Release and updates
#     CHANGELOG.md and version.txt — which triggers release.yml to publish the image.
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
