# Semantic versioning automation (https://github.com/googleapis/release-please).
#
# How it works:
#   - Commits to main follow Conventional Commits (feat:, fix:, chore:, feat!: …).
#   - release-please keeps a "release PR" open that accumulates the changelog and the
#     next semver bump (fix -> patch, feat -> minor, ! / BREAKING CHANGE -> major).
#   - Merging that PR creates the git tag (vX.Y.Z) + GitHub Release and updates
#     CHANGELOG.md and version.txt.
#   - The publish job below then builds and pushes the Docker image. It lives in THIS
#     workflow (gated on release_created) rather than reacting to the `release` event,
#     because releases created via GITHUB_TOKEN do not trigger downstream workflows.
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish image to GHCR
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
