# Manual / fallback image publish to GitHub Container Registry.
#
# The normal path publishes from release-please.yml (gated on release_created), because
# releases created by GITHUB_TOKEN don't trigger the `release` event. This workflow
# stays for two cases:
#   - a release published by a human / PAT (e.g. the bootstrap v0.1.0 via `gh release create`)
#   - manual re-publish of any existing tag via "Run workflow"
name: Release (manual)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=semver,pattern=v{{major}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
