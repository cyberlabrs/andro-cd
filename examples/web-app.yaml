apiVersion: andro-cd/v1
kind: ECSService
metadata:
  name: web-app
  labels:
    team: platform
    env: production
    tier: frontend
spec:
  region: eu-central-1
  cluster: production
  service:
    desiredCount: 2
    launchType: FARGATE
    assignPublicIp: true
  network:
    vpc: vpc-0abc1234567890
    subnets:
      - subnet-0aaa111
      - subnet-0bbb222
    securityGroups:
      - sg-0ccc333
  taskDefinition:
    cpu: "256"
    memory: "512"
    executionRoleArn: arn:aws:iam::123456789012:role/ecsTaskExecutionRole
    containers:
      - name: web
        image: nginx:1.27
        portMappings: [80]
        environment:
          APP_ENV: production
          LOG_LEVEL: info
        logGroup: /ecs/web-app
